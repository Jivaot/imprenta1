<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueSplat1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0052cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001a99;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueSplat2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a80ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0066ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0052cc;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="splatShine" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#0052cc;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Gota central izquierda -->
  <ellipse cx="100" cy="80" rx="45" ry="55" fill="url(#blueSplat1)" filter="url(#shadow)"/>
  <ellipse cx="100" cy="80" rx="45" ry="55" fill="url(#splatShine)"/>
  
  <!-- Gota central derecha grande -->
  <circle cx="200" cy="70" r="50" fill="url(#blueSplat2)" filter="url(#shadow)"/>
  <circle cx="200" cy="70" r="50" fill="url(#splatShine)"/>
  
  <!-- Conector azul entre gotas -->
  <path d="M 140 100 Q 170 85 200 70" stroke="#0066ff" stroke-width="12" fill="none" stroke-linecap="round" filter="url(#shadow)"/>
  
  <!-- Gota pequeña en la esquina superior izquierda -->
  <circle cx="60" cy="40" r="12" fill="#001a99"/>
  
  <!-- Gota pequeña arriba en medio -->
  <circle cx="140" cy="25" r="18" fill="url(#blueSplat2)"/>
  <circle cx="140" cy="25" r="18" fill="url(#splatShine)"/>
  
  <!-- Gota pequeña a la derecha -->
  <circle cx="240" cy="35" r="16" fill="#0052cc"/>
  
  <!-- Gota grande abajo a la derecha -->
  <circle cx="280" cy="85" r="48" fill="url(#blueSplat1)" filter="url(#shadow)"/>
  <circle cx="280" cy="85" r="48" fill="url(#splatShine)"/>
  
  <!-- Gotita diminuta a la izquierda -->
  <circle cx="75" cy="60" r="8" fill="#001a99"/>
  
  <!-- Línea/salpicadura pequeña arriba a la izquierda -->
  <ellipse cx="45" cy="50" rx="3" ry="10" fill="#0066ff" transform="rotate(-30 45 50)"/>
</svg>
