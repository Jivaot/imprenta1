<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradientes de luz parpadeante -->
    <linearGradient id="jamaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#f0f4ff" />
      <stop offset="100%" stop-color="#e8ecff" />
    </linearGradient>
    
    <linearGradient id="imagenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff" />
      <stop offset="50%" stop-color="#0099ff" />
      <stop offset="100%" stop-color="#0066ff" />
    </linearGradient>

    <!-- Filtro de brillo radiante -->
    <filter id="glowEffect" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Filtro de brillo intenso para IMAGEN -->
    <filter id="glowIntense" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur" />
      <feFlood flood-color="#0066ff" flood-opacity="0.8" result="flood" />
      <feComposite in="flood" in2="coloredBlur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Animación de parpadeo/brillo -->
    <style>
      @keyframes glow-pulse {
        0%, 100% { 
          filter: drop-shadow(0 0 4px rgba(0, 102, 255, 0.4));
          opacity: 0.9;
        }
        50% { 
          filter: drop-shadow(0 0 12px rgba(0, 102, 255, 0.8)) drop-shadow(0 0 20px rgba(0, 153, 255, 0.5));
          opacity: 1;
        }
      }
      
      .jama-text {
        animation: glow-pulse 3s ease-in-out infinite;
      }

      @keyframes glow-pulse-intense {
        0%, 100% { 
          filter: drop-shadow(0 0 6px rgba(0, 153, 255, 0.5)) drop-shadow(0 0 12px rgba(0, 102, 255, 0.3));
          opacity: 0.95;
        }
        50% { 
          filter: drop-shadow(0 0 16px rgba(0, 102, 255, 0.9)) drop-shadow(0 0 28px rgba(0, 200, 255, 0.6));
          opacity: 1;
        }
      }
      
      .imagen-text {
        animation: glow-pulse-intense 3s ease-in-out infinite;
      }
    </style>
  </defs>

  <!-- JAMA - Texto grande en blanco con brillo -->
  <text
    x="20"
    y="85"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="72"
    font-weight="900"
    letter-spacing="-2"
    fill="url(#jamaGradient)"
    filter="url(#glowEffect)"
    class="jama-text"
  >
    JAMA
  </text>

  <!-- IMAGEN - Texto grande en azul con brillo intenso -->
  <text
    x="24"
    y="110"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="32"
    font-weight="700"
    letter-spacing="2"
    fill="url(#imagenGradient)"
    filter="url(#glowIntense)"
    class="imagen-text"
  >
    IMAGEN
  </text>
</svg>
