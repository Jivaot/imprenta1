<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo degradado -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3f97d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#173a63;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Círculo de fondo -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGradient)"/>
  
  <!-- Elemento superior izquierdo (representa estampado) -->
  <rect x="55" y="50" width="35" height="35" rx="4" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <line x1="65" y1="65" x2="85" y2="65" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="60" y1="72" x2="90" y2="72" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="55" y1="79" x2="90" y2="79" stroke="#ffffff" stroke-width="1.5"/>
  
  <!-- Elemento superior derecho (representa diseño) -->
  <circle cx="135" cy="65" r="12" fill="none" stroke="#8fd8ff" stroke-width="2"/>
  <circle cx="135" cy="65" r="6" fill="#8fd8ff"/>
  
  <!-- Elemento inferior (representa impresión/tinta) -->
  <path d="M 70 115 Q 100 140 130 115" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="75" cy="125" r="3" fill="#8fd8ff"/>
  <circle cx="100" cy="135" r="3" fill="#8fd8ff"/>
  <circle cx="125" cy="125" r="3" fill="#8fd8ff"/>
</svg>
